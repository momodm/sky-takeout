server:
  port: 8080

spring:
  application:
    name: sky-server
  main:
    allow-circular-references: true
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SKY_DB_URL}
    username: ${SKY_DB_USERNAME}
    password: ${SKY_DB_PASSWORD}
  redis:
    host: ${SKY_REDIS_HOST}
    port: ${SKY_REDIS_PORT}
    database: ${SKY_REDIS_DATABASE}
    password: ${SKY_REDIS_PASSWORD:}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sky.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    "[com.sky]": debug
    "[org.springframework]": info

sky:
  jwt:
    admin-secret-key: ${SKY_JWT_ADMIN_SECRET_KEY}
    admin-ttl: ${SKY_JWT_ADMIN_TTL}
    admin-token-name: ${SKY_JWT_ADMIN_TOKEN_NAME}
    user-secret-key: ${SKY_JWT_USER_SECRET_KEY}
    user-ttl: ${SKY_JWT_USER_TTL}
    user-token-name: ${SKY_JWT_USER_TOKEN_NAME}
  aliyunoss:
    endpoint: ${SKY_ALIYUNOSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
    access-key-id: ${SKY_ALIYUNOSS_ACCESS_KEY_ID:}
    access-key-secret: ${SKY_ALIYUNOSS_ACCESS_KEY_SECRET:}
    bucket-name: ${SKY_ALIYUNOSS_BUCKET_NAME:}

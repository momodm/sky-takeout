#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  localhost;

        location = /customer {
            return 302 /customer/;
        }

        location = /console {
            return 302 /console/;
        }

        # React SPA 双入口：顾客端和后台端都复用同一份构建结果。
        location /customer/ {
            root   html/sky-web;
            try_files $uri $uri/ /customer/index.html;
        }

        location /console/ {
            root   html/sky-web;
            try_files $uri $uri/ /console/index.html;
        }

        location /assets/ {
            root   html/sky-web;
            expires 1h;
            add_header Cache-Control "public";
        }

        # 兼容之前的静态演示页入口。
        location / {
            root   html/sky;
            index  index.html index.htm;
        }

        # 旧静态页仍沿用 /api/* -> /admin/* 的代理习惯。
        location /api/ {
            proxy_pass   http://localhost:8080/admin/;
        }

        # 新前端顾客端代理：/api/user/* -> /user/*
        location /api/user/ {
            proxy_pass   http://localhost:8080/user/;
        }

        # 新前端后台端代理：/api/admin/* -> /admin/*
        location /api/admin/ {
            proxy_pass   http://localhost:8080/admin/;
        }

        # 后台实时提醒继续复用现有 WebSocket 通道。
        location /ws/admin/orders {
            proxy_pass http://localhost:8080/ws/admin/orders;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # 本地静态页不单独提供 favicon，直接返回 204，避免重复写日志。
        location = /favicon.svg {
            alias  E:/sky/nginx/html/sky-web/favicon.svg;
        }

        location = /favicon.ico {
            access_log  off;
            log_not_found off;
            return 204;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
